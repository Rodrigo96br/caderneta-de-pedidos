<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jogo da Memória - Horizontal</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg,#0f2027,#203a43,#2c5364);
    text-align:center;
    color:white;
    overflow-x:hidden;
}

h1{
    margin:10px;
}

#placar{
    font-size:10px;
    margin:5px;
}

.tabuleiro{
    display:grid;
    grid-template-columns: repeat(12, 1fr);
    max-width:95vw;
    margin:10px auto;
    gap:6px;
}

.carta{
    aspect-ratio:1/1;
    background:#ffffff;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    cursor:pointer;
    transition:transform 0.3s;
}

.carta:hover{
    transform:scale(1.05);
}

.carta.fechada{
    background:#111;
    color:#111;
}

#mensagem{
    font-size:20px;
    margin:10px;
    font-weight:bold;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-bottom:15px;
}

/* Aviso se estiver na vertical */

    }
}
</style>
</head>
<body>

<h1></h1>

<div id="placar">
(JOGADOR 1) <span id="p1">[0</span> -
<span id="p2">0]</span> (JOGADOR 2)<br>
Vez do: <span id="vez">JOGADOR 1</span>
</div>

<div class="tabuleiro" id="tabuleiro"></div>

<div id="mensagem"></div>

<button onclick="location.reload()">Reiniciar</button>

<audio id="somVirar" src="https://www.soundjay.com/buttons_c2026/sounds/button-20.mp3"></audio>
<audio id="somAcerto" src="https://improved-fuchsia-tymrutl3dc.edgeone.app/sound_win2.mp3"></audio>

<script>
let jogador = 1
let pontos1 = 0
let pontos2 = 0
let primeira = null
let segunda = null
let bloqueado = false

let somVirar = document.getElementById("somVirar")
let somAcerto = document.getElementById("somAcerto")

let animais = [
"🐕","🐈","🦘","🦢","🐇","🐊","🦚","🐬",
"🐘","🐅","🐆","🐂","🐖","🦍","🐒","🐈‍⬛",
"🐧","🐦","🦆","🦉","🦅","🐿","🐓","🐎",
"🦓","🐝","🐜","🦋","🐌","🪳","🐢","🐍",
"🐙","🦂","🦀","🐠"
]

let cartasArray = [...animais, ...animais]
cartasArray.sort(()=>Math.random()-0.5)

let tabuleiro = document.getElementById("tabuleiro")

cartasArray.forEach(valor=>{
    let carta = document.createElement("div")
    carta.classList.add("carta","fechada")
    carta.dataset.valor = valor
    carta.innerHTML = "🕸"
    carta.addEventListener("click", virarCarta)
    tabuleiro.appendChild(carta)
})

function virarCarta(){
    if(bloqueado) return
    if(!this.classList.contains("fechada")) return

    somVirar.cloneNode(true).play()

    this.classList.remove("fechada")
    this.innerHTML = this.dataset.valor

    if(!primeira){
        primeira = this
    }else{
        segunda = this
        bloqueado = true

        if(primeira.dataset.valor === segunda.dataset.valor){

            somAcerto.cloneNode(true).play()

            if(jogador === 1){
                pontos1++
                document.getElementById("p1").innerText = pontos1
            }else{
                pontos2++
                document.getElementById("p2").innerText = pontos2
            }

            resetar()
        }else{
            setTimeout(()=>{
                primeira.classList.add("fechada")
                segunda.classList.add("fechada")
                primeira.innerHTML="🕸"
                segunda.innerHTML="🕸"
                trocarJogador()
                resetar()
            },800)
        }
    }
}

function trocarJogador(){
    jogador = jogador === 1 ? 2 : 1
    document.getElementById("vez").innerText = "Jogador " + jogador
}

function resetar(){
    primeira = null
    segunda = null
    bloqueado = false
    verificarFim()
}

function verificarFim(){
    if(pontos1 + pontos2 === 36){
        let msg=""
        if(pontos1 > pontos2) msg="Jogador 1 venceu!"
        else if(pontos2 > pontos1) msg="Jogador 2 venceu!"
        else msg="Empate!"
        document.getElementById("mensagem").innerText = msg
    }
}
</script>

</body>
</html>
